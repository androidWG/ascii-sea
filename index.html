<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ascii sea</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jacquard+12&family=Jacquarda+Bastarda+9&family=Pixelify+Sans:wght@400..700&display=swap');
    </style>

    <link rel="stylesheet" type="text/css" href="src/style.scss">
    <link rel="stylesheet" type="text/css" href="src/animations.sass">
    <link rel="stylesheet" type="text/css" href="src/sliders.scss">
    <link rel="stylesheet" type="text/css" href="src/drawer.scss">
</head>
<body>

<div id="ascii-background">
    <canvas id="ascii-canvas"></canvas>
</div>

<div class="content">
    <div class="drawer" data-influence="0.5" data-influence-margin="50">
        <button id="drawer-handle">
            === <span class="arrow">↑</span> parameters <span class="arrow">↑</span> ===
        </button>
        <div class="drawer-content">
            <div class="group">
                <div class="corners">
                    <span class="text-micro">+</span>
                    <span class="text-micro">+</span>
                    <span class="text-micro">+</span>
                    <span class="text-micro">+</span>
                </div>
                <p class="label">grid</p>
                <div class="slider" data-slider data-max-length="32">
                    <label for="density" class="text-small">density</label>
                    <div class="inner">
                        <canvas></canvas>
                        <input id="density" list="density-markers" type="range" min="0.5" max="4" step="0.05"
                               value="1.25">
                        <datalist id="density-markers">
                            <option value="0.75"></option>
                            <option value="1.0"></option>
                            <option value="1.25"></option>
                            <option value="1.5"></option>
                            <option value="2.0"></option>
                            <option value="3.5"></option>
                        </datalist>
                    </div>
                </div>
                <div class="slider" data-slider data-max-length="32">
                    <label for="speed" class="text-small">speed</label>
                    <div class="inner">
                        <canvas></canvas>
                        <input id="speed" list="speed-markers" type="range" min="0.15" max="5" step="0.05" value="0.5">
                        <datalist id="speed-markers">
                            <option value="0.5"></option>
                            <option value="0.75"></option>
                            <option value="1.0"></option>
                            <option value="1.25"></option>
                            <option value="1.5"></option>
                            <option value="2.0"></option>
                            <option value="3.5"></option>
                            <option value="4"></option>
                        </datalist>
                    </div>
                </div>
                <div class="slider" data-slider data-max-length="32">
                    <label for="border" class="text-small">border</label>
                    <div class="inner">
                        <canvas></canvas>
                        <input id="border" list="border-markers" type="range" min="0" max="500" step="10" value="100">
                        <datalist id="border-markers">
                            <option value="0.75"></option>
                            <option value="1.0"></option>
                            <option value="1.25"></option>
                            <option value="1.5"></option>
                            <option value="2.0"></option>
                            <option value="3.5"></option>
                        </datalist>
                    </div>
                </div>
            </div>
            <div class="group">
                <div class="corners">
                    <span class="micro">+</span>
                    <span class="micro">+</span>
                    <span class="micro">+</span>
                    <span class="micro">+</span>
                </div>
                <p class="label micro">visuals</p>
                <div class="slider" data-slider data-max-length="32">
                    <label for="opacity" class="text-small">opacity</label>
                    <div class="inner">
                        <canvas></canvas>
                        <input id="opacity" list="opacity-markers" type="range" min="0" max="1" step="0.05"
                               value="0.8">
                        <datalist id="opacity-markers">
                            <option value="0.25"></option>
                            <option value="0.5"></option>
                            <option value="0.75"></option>
                        </datalist>
                    </div>
                </div>
                <div class="slider" data-slider data-max-length="32">
                    <label for="fps" class="text-small">FPS</label>
                    <div class="inner">
                        <canvas></canvas>
                        <input id="fps" list="fps-markers" type="range" min="1" max="120" step="1" value="30">
                        <datalist id="fps-markers">
                            <option value="12"></option>
                            <option value="24"></option>
                            <option value="30"></option>
                            <option value="60"></option>
                        </datalist>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container centered">
        <h1 id="love" data-influence="0.8" data-influence-margin="25">i love ascii</h1>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/noisejs@2.1.0/index.min.js"></script>
<script src="src/dividers.js"></script>

<script type="module">
    import {AsciiDotsBackground} from "./src/ascii.js";
    import {buildAllSliders, resizeSliders} from "./src/sliders.js";

    const background = new AsciiDotsBackground({
        targetFps: 24,
        backgroundColor: '#000000',
        textColor: '250, 250, 250',
        density: 1.50,
        animationSpeed: 0.50,
        removeWaveLine: true,
        influenceSize: 100,
        influenceStrength: 0.45,
        minInfluence: 4,
        menuHoverDuration: 800,
        menuInfluenceStrength: 2,
        border: true,
        startupDuration: 1,
    });

    buildAllSliders();

    function addSlider(id, target, extra = null) {
        const slider = document.querySelector(`#${id}`);
        // Update target immediately with last used value from slider
        background[target] = parseFloat(slider.value);

        slider.addEventListener("input", (e) => {
            background[target] = parseFloat(e.target.value);
            if (extra) {
                extra();
            }
        });
    }

    window.addEventListener("resize", resizeSliders);

    addSlider("density", "density", () => {
        background.calculateGrid();
        background.prepare();
    });

    addSlider("speed", "animationSpeed");
    addSlider("border", "borderSize");
    addSlider("fps", "targetFps");
    addSlider("opacity", "opacity");

    const drawer = document.querySelector(".drawer");
    document.querySelector("#drawer-handle").addEventListener("click", (e) => {
        if (drawer.classList.contains("open")) {
            drawer.classList.remove("open");
        } else {
            drawer.classList.add("open");
            background.updateRegions();
        }
    })
</script>

</body>
</html>
