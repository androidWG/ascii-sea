<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ascii sea</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jacquard+12&family=Jacquarda+Bastarda+9&family=Pixelify+Sans:wght@400..700&display=swap');
    </style>

    <link rel="stylesheet" type="text/css" href="src/style.sass">
    <link rel="stylesheet" type="text/css" href="src/animations.sass">
    <link rel="stylesheet" type="text/css" href="src/sliders.sass">
</head>
<body>

<div id="ascii-background">
    <canvas id="ascii-canvas"></canvas>
</div>

<div class="content">
    <div class="container topbar" data-influence data-strength="1">
        <div class="slider" data-slider data-max-length="32" style="flex-grow: 1">
            <label for="density">density</label>
            <div class="inner">
                <div class="tooltip">
                    1
                </div>
                <canvas></canvas>
                <input id="density" list="density-markers" type="range" min="0.5" max="4" step="0.05" value="1.25">
                <datalist id="density-markers">
                    <option value="0.75"></option>
                    <option value="1.0"></option>
                    <option value="1.25"></option>
                    <option value="1.5"></option>
                    <option value="2.0"></option>
                    <option value="3.5"></option>
                </datalist>
            </div>
        </div>
        <div class="slider" data-slider data-max-length="32" style="flex-grow: 1">
            <label for="speed">speed</label>
            <div class="inner">
                <div class="tooltip">
                    1
                </div>
                <canvas></canvas>
                <input id="speed" type="range" min="0.15" max="5" step="0.05" value="0.5">
            </div>
        </div>
        <div class="slider" data-slider data-max-length="32" style="flex-grow: 1">
            <label for="border">border</label>
            <div class="inner">
                <div class="tooltip">
                    1
                </div>
                <canvas></canvas>
                <input id="border" list="border-markers" type="range" min="0.5" max="4" step="0.05" value="1.25">
                <datalist id="border-markers">
                    <option value="0.75"></option>
                    <option value="1.0"></option>
                    <option value="1.25"></option>
                    <option value="1.5"></option>
                    <option value="2.0"></option>
                    <option value="3.5"></option>
                </datalist>
            </div>
        </div>
    </div>

    <div class="container centered">
        <h1 id="love" data-influence="0.8" data-influence-margin="25" >i love ascii</h1>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/noisejs@2.1.0/index.min.js"></script>
<script src="src/dividers.js"></script>

<script type="module">
    import {AsciiDotsBackground} from "./src/ascii.js";
    import {buildAllSliders} from "./src/sliders.js";

    const asciiBackground = new AsciiDotsBackground({
        targetFps: 24,
        backgroundColor: '#000000',
        textColor: '250, 250, 250',
        density: 1.50,
        animationSpeed: 0.50,
        removeWaveLine: true,
        influenceSize: 100,
        influenceStrength: 0.45,
        minInfluence: 4,
        menuHoverDuration: 800,      // Time in ms for the blank area to fully reveal (default: 800ms)
        menuInfluenceStrength: 2,     // Strength of the menu hover effect (default: 5)
        border: true,
        startupDuration: 10,      // Total time for the startup animation (default: 2s)
    });

    buildAllSliders();

    document.querySelector("#density").addEventListener("input", (e) => {
        asciiBackground.density = e.target.value;
        asciiBackground.calculateGrid();
        asciiBackground.prepare();
    });

    document.querySelector("#speed").addEventListener("input", (e) => {
        asciiBackground.animationSpeed = e.target.value;
    })
</script>

</body>
</html>
